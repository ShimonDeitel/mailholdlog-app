name: MailHoldLog
options:
  bundleIdPrefix: com.shimondeitel.mailholdlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  MailHoldLog:
    type: application
    platform: iOS
    sources:
      - path: MailHoldLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mailholdlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MailHoldLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MailHoldLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MailHoldLogTests
      - path: MailHoldLog.storekit
    dependencies:
      - target: MailHoldLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mailholdlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MailHoldLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MailHoldLogUITests
    dependencies:
      - target: MailHoldLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mailholdlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  MailHoldLog:
    build:
      targets:
        MailHoldLog: all
        MailHoldLogTests: [test]
        MailHoldLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: MailHoldLog.storekit
    test:
      config: Debug
      storeKitConfiguration: MailHoldLog.storekit
      targets:
        - MailHoldLogTests
        - MailHoldLogUITests
    archive:
      config: Release
